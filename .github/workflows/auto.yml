name: Build cloudflared

# 仅手动触发
on:
  workflow_dispatch:

# 确保 GITHUB_TOKEN 有权限创建 Release
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      # 只保留合法的 GOOS/GOARCH 组合
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: mipsle
          - goos: windows
            goarch: amd64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      # 拉取仓库
      - uses: actions/checkout@v3

      # 安装 Go
      - uses: actions/setup-go@v4
        with:
          go-version: 1.20.14

      # 编译二进制
      - name: Build cloudflared
        run: |
          BUILD_DIR=build/${{ matrix.goos }}_${{ matrix.goarch }}
          mkdir -p $BUILD_DIR

          OUTPUT=$BUILD_DIR/cloudflared
          if [ "${{ matrix.goos }}" = "windows" ]; then
            OUTPUT=${OUTPUT}.exe
          fi

          echo "编译 ${{ matrix.goos }}/ ${{ matrix.goarch }} ..."
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 go build -o $OUTPUT ./cmd/cloudflared
          
          if [ ! -f "$OUTPUT" ]; then
          echo "编译失败，文件不存在: $OUTPUT"
            exit 1
          fi
          echo "编译成功: $OUTPUT"

      # 上传 Artifact（调试/缓存用，可选）
      - uses: actions/upload-artifact@v4
        with:
          name: cloudflared-${{ matrix.goos }}-${{ matrix.goarch }}
          path: build/${{ matrix.goos }}_${{ matrix.goarch }}/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # 下载 build job 的 artifact
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files

      # 准备 Release 文件并压缩
      - name: Prepare release files
        run: |
          mkdir -p release
          
          for FILE in release-files/*/*; do
            BASENAME=$(basename "$FILE")
            OS_ARCH=$(basename $(dirname "$FILE"))
            if [[ "$BASENAME" == *".exe" ]]; then
              # Windows 压缩为 zip
              zip -j "release/${BASENAME%.exe}.zip" "$FILE"
            else
              # Linux/macOS 压缩为 tar.gz
              cp "$FILE" "release/${OS_ARCH}-${BASENAME}"
              chmod +x "release/${OS_ARCH}-${BASENAME}"
              tar -czvf "release/${OS_ARCH}-${BASENAME}.tar.gz" -C release "${OS_ARCH}-${BASENAME}"
              rm "release/${OS_ARCH}-${BASENAME}"
            fi
          done

          echo " Release 文件列表: "
          ls -lh release
        

      # 创建 GitHub Release 并上传文件
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}