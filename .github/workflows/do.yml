name: Build and Release

on:
  push:
    tags:
      - 'v*'   # 只有 push 以 v 开头的 tag 才触发 release
  workflow_dispatch: # 手动触发

# 确保 GITHUB_TOKEN 有权限创建 Release
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取源码
      - name: Checkout
        uses: actions/checkout@v3

      # 2. 设置 Go 版本
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.20.14

      # 3. 编译各个平台
      - name: Build cloudflared
        run: |
          mkdir -p build/linux_amd64
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags "-s -w" -o build/linux_amd64/cloudflared-linux-amd64 ./cmd/cloudflared

          mkdir -p build/linux_arm64
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags "-s -w" -o build/linux_arm64/cloudflared-linux-arm64 ./cmd/cloudflared

          mkdir -p build/linux_mipsle
          GOOS=linux GOARCH=mipsle CGO_ENABLED=0 go build -ldflags "-s -w" -o build/linux_mipsle/cloudflared-linux-mipsle ./cmd/cloudflared

          mkdir -p build/windows_amd64
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -ldflags "-s -w" -o build/windows_amd64/cloudflared-windows-amd64.exe ./cmd/cloudflared

          mkdir -p build/windows_arm64
          GOOS=windows GOARCH=arm64 CGO_ENABLED=0 go build -ldflags "-s -w" -o build/windows_arm64/cloudflared-windows-arm64.exe ./cmd/cloudflared

          mkdir -p build/darwin_amd64
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go build -ldflags "-s -w" -o build/darwin_amd64/cloudflared-darwin-amd64 ./cmd/cloudflared

          mkdir -p build/darwin_arm64
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build -ldflags "-s -w" -o build/darwin_arm64/cloudflared-darwin-arm64 ./cmd/cloudflared
      
      # 4. 创建 Release
      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 5. 上传 build 下所有文件
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: build/**/*   # 上传 build 目录下所有文件
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}