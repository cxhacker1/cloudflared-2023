name: Build cloudflared

# 仅手动触发
on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag for the release (e.g. v1.0.0)'
        required: true

# 给 GITHUB_TOKEN 设置权限，确保可以创建 Release
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
        # 设置编译变环境变量
      GOOS: linux
      GOARCH: mipsle
      CGO_ENABLED: 0
    steps:
        # 拉取源码
      - name: Checkout code
        uses: actions/checkout@v3
        
        # 设置 go 版本
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.20.14'  # Cloudflared 2023-10.0 最适配的go版本

        # 安装 go 依赖
      - name: Install Go dependencies
        run: go mod download

        # 开始编译
      - name: Build cloudflared
        run: |
          mkdir -p build
          go build -ldflags "-s -w" -o build/cloudflared ./cmd/cloudflared
        
        # 创建 GitHub Release（使用手动输入的 tag
      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: Release ${{ github.event.inputs.release_tag }}
          body: "cloudflared linux mipsle build"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        # 上传编译好的二进制到 Release
      - name: Upload binary to release
        uses: softprops/action-gh-release@v1
        with:
          files: build/cloudflared
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}